<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Prospect 3D Visualizer</title>
  <style>
    :root {
      --bg-darker: #090d16;
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --border-light: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-pink: #ec4899;
    }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: var(--bg-darker);
      color: var(--text-main);
      font-family: system-ui, -apple-system, sans-serif;
    }
    button, input, select {
      font-family: inherit;
    }
    .app-layout {
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    /* Sidebars */
    .sidebar {
      background: var(--bg-dark);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
      z-index: 10;
    }
    .right-sidebar {
      background: var(--bg-dark);
      border-left: 1px solid var(--border-light);
      height: 100%;
      box-sizing: border-box;
      z-index: 10;
      overflow-y: auto;
    }
    /* Main viewport block */
    .main-viewport-container {
      display: grid;
      grid-template-rows: 1fr 300px;
      height: 100%;
      position: relative;
    }
    #viewport-3d {
      width: 100%;
      height: 100%;
      position: relative;
    }
    /* Slicing panel container at bottom */
    #section-view-container {
      border-top: 1px solid var(--border-light);
      height: 100%;
      background: var(--bg-darker);
    }
    
    /* Layout Elements */
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .logo {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .project-selector-container {
      display: flex;
      gap: 8px;
    }
    .styled-select {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 8px;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .btn-icon {
      background: var(--accent-blue);
      color: white;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover {
      background: #2563eb;
    }
    
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .control-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .control-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .btn-sidebar {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .btn-sidebar:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .btn-primary {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-small {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-small.active {
      background: var(--accent-green);
      color: white;
      border-color: #34d399;
    }
    
    .row-spread {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .highlight-val {
      color: var(--accent-blue);
      font-size: 0.85rem;
    }
    
    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid var(--border-light);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.2);
    }
    
    /* Overlay modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-card {
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .modal-header {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
    }
    .form-group {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="email"] {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 8px;
      border-radius: 6px;
    }
    
    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(9, 13, 22, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top: 3px solid var(--accent-blue);
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .floating-toolbar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg style="width:20px;height:20px;color:var(--accent-blue)" viewBox="0 0 24 24"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6Z"/></svg>
          MONARK 3D MINING
        </div>
        <div class="project-selector-container">
          <select id="project-select" class="styled-select">
            <option value="">Select Project...</option>
          </select>
          <button id="create-project-btn" class="btn-icon" title="New Project">+</button>
        </div>
      </div>

      <div class="sidebar-content">
        <!-- Visualizer Controls (populated when project active) -->
        <div id="visualizer-controls" class="sidebar-section" style="display: none;">
          <div class="section-title">Visual Controls</div>
          
          <!-- Grade Cutoff -->
          <div class="control-card">
            <span class="control-label">Au Grade Cutoff (g/t)</span>
            <div id="cutoff-slider-container"></div>
          </div>
          
          <!-- 3D Ruler -->
          <div class="control-card">
            <div class="row-spread">
              <span class="control-label">3D Ruler Tool</span>
              <button id="toggle-ruler-btn" class="btn-small">Activate</button>
            </div>
            <div id="ruler-results" style="display: none; margin-top: 8px;">
              <div style="font-size:0.8rem;font-weight:700;">Distance: <span id="ruler-distance-val" style="color:var(--accent-green);">-</span></div>
              <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;">
                dX: <span id="ruler-dx-val">-</span> | 
                dY (Elev): <span id="ruler-dy-val">-</span> | 
                dZ (North): <span id="ruler-dz-val">-</span>
              </div>
            </div>
          </div>

          <div class="section-title">Data Actions</div>
          <button id="open-import-btn" class="btn-sidebar">Import Drillholes (CSV)</button>
          <button id="open-supp-btn" class="btn-sidebar">Upload Topo / Trenches / Veins</button>
          <button id="open-struct-btn" class="btn-sidebar">Structural Readings</button>
          <button id="open-qaqc-btn" class="btn-sidebar">QA/QC Reference Standards</button>
          <button id="open-share-btn" class="btn-sidebar">Share Project</button>
          <button id="open-history-btn" class="btn-sidebar">View Import History</button>
          <button id="open-export-btn" class="btn-sidebar">Export Project Data</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <div id="auth-status-div">Session Status</div>
      </div>
    </aside>

    <!-- Main Scene Area -->
    <main class="main-viewport-container">
      <div id="viewport-3d"></div>
      
      <!-- Synced 2D Cross-section sheet -->
      <div id="section-view-container"></div>
      
      <!-- Camera Toolbar overlay -->
      <div id="toolbar-3d-container" class="floating-toolbar"></div>
    </main>

    <!-- Right Sidebar (Inspector) -->
    <aside class="right-sidebar">
      <div id="inspector-container"></div>
    </aside>
  </div>

  <!-- Loading State -->
  <div id="global-loading" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
    <div id="loading-msg" style="font-weight: 600;">Initializing Visualizer...</div>
  </div>

  <!-- Modals Container -->
  <div id="modal-container" style="display: none;"></div>

  <script src="dist/bundle.js"></script>
  <script>
    // Initialize application logic
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
    
    let currentProject = null;
    let viewport3D = null;
    let rulerTool = null;
    let sectionPanel = null;
    let projectSwitcher = null;
    
    window.addEventListener('DOMContentLoaded', async () => {
      // Check for share token in URL first
      const urlParams = new URLSearchParams(window.location.search);
      const shareToken = urlParams.get('share');
      
      if (shareToken) {
        await loadSharedScene(shareToken);
        return;
      }
      
      // Check authentication and bootstrap layout
      await checkAuth();
      
      // Initialize Project Switcher
      projectSwitcher = new window.ProjectSwitcher('project-select', async (pid) => {
        if (pid) {
          await loadProjectScene(pid);
        } else {
          unloadActiveProject();
        }
      });
      await projectSwitcher.loadProjects();
      
      // Auto-load last active project if exists
      const lastProj = localStorage.getItem('active_project_id');
      if (lastProj) {
        const select = document.getElementById('project-select');
        select.value = lastProj;
        if (select.value === lastProj) {
          await loadProjectScene(lastProj);
        }
      }
      
      // Setup Project Creation Action
      document.getElementById('create-project-btn').addEventListener('click', () => showCreateProjectModal());
    });

    async function checkAuth() {
      const authDiv = document.getElementById('auth-status-div');
      try {
        const token = localStorage.getItem('mining_session_token');
        if (!token) {
          showLoginModal();
          return;
        }
        
        // Mock success or call token validation
        authDiv.innerHTML = `Signed In | Developer`;
      } catch (err) {
        showLoginModal();
      }
    }

    async function loadProjectScene(projectId) {
      currentProject = projectId;
      localStorage.setItem('active_project_id', projectId);
      
      const loading = document.getElementById('global-loading');
      const loaderMsg = document.getElementById('loading-msg');
      loading.style.display = 'flex';
      loaderMsg.textContent = 'Loading 3D geological scene...';
      
      try {
        // Destroy existing viewport if active
        if (viewport3D) {
          viewport3D.destroy();
          document.getElementById('viewport-3d').innerHTML = '';
        }
        
        // Setup Inspector
        const inspector = new window.InspectorPanel('inspector-container', {
          onIntervalSelected: (intervalId) => {
            if (viewport3D && viewport3D.assaysRenderer) {
              viewport3D.assaysRenderer.highlightInterval(intervalId);
            }
          }
        });
        
        // Initialize Viewport
        viewport3D = window.init3DViewport('viewport-3d', {
          onSelect: (type, data) => {
            if (type === 'interval') {
              inspector.loadCollar(data.collarId, data.intervalId);
            } else if (type === 'trace') {
              inspector.loadCollar(data.collarId);
            }
          }
        });
        
        // Set toolbar
        const toolbarContainer = document.getElementById('toolbar-3d-container');
        toolbarContainer.innerHTML = '';
        const toolbar = new window.SceneToolbar(toolbarContainer, viewport3D);
        
        // Load data via SceneLoader
        const data = await viewport3D.sceneLoader.loadProject(projectId);
        
        // Setup Cutoff Slider
        const sliderContainer = document.getElementById('cutoff-slider-container');
        sliderContainer.innerHTML = '';
        const cutoff = new window.CutoffSlider(sliderContainer, viewport3D.assaysRenderer);
        
        // Setup Sync 2D Section Slicing Panel
        const sectionContainer = document.getElementById('section-view-container');
        sectionPanel = new window.SectionViewPanel(sectionContainer, viewport3D);
        sectionPanel.setDrillholes(data.drillholes);
        
        // Setup Ruler Measurement Tool
        const rulerBtn = document.getElementById('toggle-ruler-btn');
        const rulerResults = document.getElementById('ruler-results');
        
        rulerTool = new window.MeasurementTool(viewport3D, (res) => {
          if (!res) {
            rulerResults.style.display = 'none';
            return;
          }
          rulerResults.style.display = 'block';
          document.getElementById('ruler-distance-val').textContent = `${res.distance.toFixed(2)}m`;
          document.getElementById('ruler-dx-val').textContent = `${res.dx.toFixed(1)}m`;
          document.getElementById('ruler-dy-val').textContent = `${res.dy.toFixed(1)}m`;
          document.getElementById('ruler-dz-val').textContent = `${res.dz.toFixed(1)}m`;
          
          if (res.completed) {
            rulerBtn.classList.remove('active');
            rulerBtn.textContent = 'Activate';
          }
        });
        
        rulerBtn.onclick = () => {
          const isActive = rulerBtn.classList.toggle('active');
          if (isActive) {
            rulerBtn.textContent = 'Ruler Active';
            rulerTool.setActive(true);
          } else {
            rulerBtn.textContent = 'Activate';
            rulerTool.setActive(false);
          }
        };

        // Wire upload actions
        document.getElementById('open-import-btn').onclick = () => showImportModal();
        document.getElementById('open-supp-btn').onclick = () => showSupplementaryModal();
        document.getElementById('open-struct-btn').onclick = () => showStructuralModal();
        document.getElementById('open-qaqc-btn').onclick = () => showQaqcModal();
        document.getElementById('open-share-btn').onclick = () => showShareModal();
        document.getElementById('open-history-btn').onclick = () => showHistoryModal();
        document.getElementById('open-export-btn').onclick = () => showExportModal();
        
        document.getElementById('visualizer-controls').style.display = 'flex';
        loading.style.display = 'none';
      } catch (err) {
        loading.style.display = 'none';
        alert(`Failed to load project: ${err.message}`);
      }
    }

    function unloadActiveProject() {
      currentProject = null;
      localStorage.removeItem('active_project_id');
      document.getElementById('visualizer-controls').style.display = 'none';
      if (viewport3D) {
        viewport3D.destroy();
        viewport3D = null;
        document.getElementById('viewport-3d').innerHTML = '';
      }
      document.getElementById('section-view-container').innerHTML = '';
      document.getElementById('inspector-container').innerHTML = '';
      document.getElementById('toolbar-3d-container').innerHTML = '';
    }

    function showLoginModal() {
      const container = document.getElementById('modal-container');
      container.style.display = 'flex';
      container.className = 'modal-overlay';
      
      container.innerHTML = `
        <div class="modal-card">
          <div class="modal-header">
            <span>Sign In to Monark 3D</span>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" value="geologist@monark.com" required>
          </div>
          <button id="login-submit-btn" class="btn-primary" style="width:100%;">Get Magic Login Link</button>
          <div id="login-feedback" style="margin-top:10px;font-size:0.8rem;text-align:center;"></div>
        </div>
      `;
      
      document.getElementById('login-submit-btn').onclick = async () => {
        const email = document.getElementById('login-email').value;
        const feedback = document.getElementById('login-feedback');
        
        feedback.textContent = 'Signing in...';
        try {
          const res = await fetch(`${API_BASE}/auth/magic-link`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          if (res.status === 202) {
            const { dev_token } = await res.json();

            // Local dev tool, no real email delivery: auto-verify the token
            // this same response just gave us instead of making the user
            // copy it out of the server console.
            const vRes = await fetch(`${API_BASE}/auth/verify?token=${dev_token}`);
            if (!vRes.ok) throw new Error("Auto sign-in failed");

            const session = await vRes.json();
            localStorage.setItem('mining_session_token', session.access_token);
            container.style.display = 'none';
            await projectSwitcher.loadProjects();
            await checkAuth();
          } else if (res.status === 403) {
            const err = await res.json().catch(() => ({}));
            feedback.innerHTML = `<span style="color:#f87171">${err.detail || 'This email is not authorized.'}</span>`;
          } else {
            feedback.textContent = 'Sign-in failed.';
          }
        } catch (err) {
          feedback.textContent = 'Server connection error.';
        }
      };
    }

    async function loadSharedScene(token) {
      // 1. Hide owner controls from sidebar
      const projSelector = document.querySelector('.project-selector-container');
      if (projSelector) projSelector.style.display = 'none';
      
      const openImport = document.getElementById('open-import-btn');
      if (openImport) openImport.style.display = 'none';
      
      const openSupp = document.getElementById('open-supp-btn');
      if (openSupp) openSupp.style.display = 'none';

      const openShare = document.getElementById('open-share-btn');
      if (openShare) openShare.style.display = 'none';

      const openHist = document.getElementById('open-history-btn');
      if (openHist) openHist.style.display = 'none';

      // Hide the entire Data Actions section
      const sectionTitles = document.querySelectorAll('.sidebar-content .section-title');
      sectionTitles.forEach(el => {
        if (el.textContent.trim().toUpperCase() === 'DATA ACTIONS') {
          el.style.display = 'none';
        }
      });
      
      // Update logo text to show Shared Mode
      const logoEl = document.querySelector('.logo');
      if (logoEl) logoEl.innerHTML = `<svg style="width:20px;height:20px;color:var(--accent-pink)" viewBox="0 0 24 24"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6Z"/></svg> MINING VIEWER`;
      
      // Update session status footer
      const authDiv = document.getElementById('auth-status-div');
      if (authDiv) authDiv.textContent = 'Read-Only Access Link';

      // Show global loading
      const loading = document.getElementById('global-loading');
      const loaderMsg = document.getElementById('loading-msg');
      loading.style.display = 'flex';
      loaderMsg.textContent = 'Loading shared prospect...';

      try {
        // Setup shared Inspector Panel
        const inspector = new window.InspectorPanel('inspector-container', {
          shareToken: token,
          onIntervalSelected: (intervalId) => {
            if (viewport3D && viewport3D.assaysRenderer) {
              viewport3D.assaysRenderer.highlightInterval(intervalId);
            }
          }
        });
        
        // Setup 3D Viewport
        viewport3D = window.init3DViewport('viewport-3d', {
          onSelect: (type, data) => {
            if (type === 'interval') {
              inspector.loadCollar(data.collarId, data.intervalId);
            } else if (type === 'trace') {
              inspector.loadCollar(data.collarId);
            }
          }
        });
        
        // Set toolbar
        const toolbarContainer = document.getElementById('toolbar-3d-container');
        toolbarContainer.innerHTML = '';
        const toolbar = new window.SceneToolbar(toolbarContainer, viewport3D);
        
        // Load data via shared SceneLoader method
        const data = await viewport3D.sceneLoader.loadSharedProject(token);
        
        // Setup Cutoff Slider
        const sliderContainer = document.getElementById('cutoff-slider-container');
        sliderContainer.innerHTML = '';
        const cutoff = new window.CutoffSlider(sliderContainer, viewport3D.assaysRenderer);
        
        // Setup Sync 2D Section Slicing Panel
        const sectionContainer = document.getElementById('section-view-container');
        sectionPanel = new window.SectionViewPanel(sectionContainer, viewport3D);
        sectionPanel.setDrillholes(data.drillholes);
        
        // Setup Ruler Measurement Tool
        const rulerBtn = document.getElementById('toggle-ruler-btn');
        const rulerResults = document.getElementById('ruler-results');
        
        rulerTool = new window.MeasurementTool(viewport3D, (res) => {
          if (!res) {
            rulerResults.style.display = 'none';
            return;
          }
          rulerResults.style.display = 'block';
          document.getElementById('ruler-distance-val').textContent = `${res.distance.toFixed(2)}m`;
          document.getElementById('ruler-dx-val').textContent = `${res.dx.toFixed(1)}m`;
          document.getElementById('ruler-dy-val').textContent = `${res.dy.toFixed(1)}m`;
          document.getElementById('ruler-dz-val').textContent = `${res.dz.toFixed(1)}m`;
          
          if (res.completed) {
            rulerBtn.classList.remove('active');
            rulerBtn.textContent = 'Activate';
          }
        });
        
        rulerBtn.onclick = () => {
          const isActive = rulerBtn.classList.toggle('active');
          if (isActive) {
            rulerBtn.textContent = 'Ruler Active';
            rulerTool.setActive(true);
          } else {
            rulerBtn.textContent = 'Activate';
            rulerTool.setActive(false);
          }
        };

        document.getElementById('visualizer-controls').style.display = 'flex';
        loading.style.display = 'none';
      } catch (err) {
        loading.style.display = 'none';
        if (err.message === 'GONG_EXPIRED') {
          document.body.innerHTML = "" +
            "<div style=\"background:#0f172a;color:white;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;\">" +
              "<svg style=\"width:64px;height:64px;color:#ef4444;margin-bottom:20px;\" viewBox=\"0 0 24 24\"><path fill=\"currentColor\" d=\"M12,2L1,21H23L12,2M12,6L19.8,19H4.2L12,6M11,10V14H13V10H11M11,16V18H13V16H11Z\"/></svg>" +
              "<h1 style=\"font-size:1.8rem;margin-bottom:8px;font-weight:700;\">Access No Longer Available</h1>" +
              "<p style=\"color:#94a3b8;font-size:1rem;\">This share link has expired or has been revoked by the project owner.</p>" +
            "</div>";
        } else {
          alert('Failed to load shared project: ' + err.message);
        }
      }
    }

    function showSupplementaryModal() {
      const container = document.getElementById('modal-container');
      container.style.display = 'flex';
      container.className = 'modal-overlay';
      
      container.innerHTML = `
        <div class="modal-card">
          <div class="modal-header">
            <span>Upload Supplementary Data</span>
            <button class="modal-close" onclick="document.getElementById('modal-container').style.display='none'">&times;</button>
          </div>
          
          <div class="form-group" style="border-bottom:1px solid var(--border-light);padding-bottom:12px;">
            <label>Topography (CSV or Shapefile .shp/.dbf/.shx/.prj)</label>
            <input type="file" id="topo-file-input" accept=".csv,.shp,.dbf,.shx,.prj" multiple>
            <button id="upload-topo-btn" class="btn-small" style="margin-top:6px;width:100%;">Upload Topography</button>
          </div>
          
          <div class="form-group" style="border-bottom:1px solid var(--border-light);padding-bottom:12px;margin-top:12px;">
            <label>Trenches (CSV or Shapefile .shp/.dbf/.shx/.prj)</label>
            <input type="file" id="trench-file-input" accept=".csv,.shp,.dbf,.shx,.prj" multiple>
            <button id="upload-trench-btn" class="btn-small" style="margin-top:6px;width:100%;">Upload Trenches</button>
          </div>
          
          <div class="form-group" style="margin-top:12px;">
            <label>Vein Solid Wireframe (OBJ or DXF)</label>
            <input type="text" id="wireframe-name" placeholder="Main_Vein_Solid" value="Main_Vein_Solid" style="background:black;border:1px solid var(--border-light);color:white;padding:6px;border-radius:4px;font-size:0.75rem;margin-bottom:6px;">
            <input type="file" id="wire-file-input" accept=".obj,.dxf">
            <button id="upload-wire-btn" class="btn-small" style="margin-top:6px;width:100%;">Upload Vein Solid</button>
          </div>
          
          <div id="supp-status" style="margin-top:12px;font-size:0.8rem;font-weight:600;text-align:center;"></div>
        </div>
      `;

      const token = localStorage.getItem('mining_session_token');
      const statusDiv = document.getElementById('supp-status');

      // 1. Topography Upload
      document.getElementById('upload-topo-btn').onclick = async () => {
        const files = document.getElementById('topo-file-input').files;
        if (files.length === 0) return alert("Select topography file(s) first");
        
        statusDiv.textContent = "Uploading topography...";
        const fileList = Array.from(files);
        const hasShp = fileList.some(f => f.name.toLowerCase().endsWith('.shp'));
        const hasDbf = fileList.some(f => f.name.toLowerCase().endsWith('.dbf'));
        const hasShx = fileList.some(f => f.name.toLowerCase().endsWith('.shx'));
        
        if (hasShp) {
          if (!hasDbf || !hasShx) {
            statusDiv.innerHTML = '<span style="color:#f87171">Error: Shapefile upload requires .shp, .dbf, and .shx files together.</span>';
            return;
          }
          const shp = fileList.find(f => f.name.toLowerCase().endsWith('.shp'));
          const dbf = fileList.find(f => f.name.toLowerCase().endsWith('.dbf'));
          const shx = fileList.find(f => f.name.toLowerCase().endsWith('.shx'));
          const prj = fileList.find(f => f.name.toLowerCase().endsWith('.prj'));
          
          const fd = new FormData();
          fd.append('shp_file', shp);
          fd.append('dbf_file', dbf);
          fd.append('shx_file', shx);
          if (prj) fd.append('prj_file', prj);
          
          const upload = async (confirm = false) => {
            const url = `${API_BASE}/projects/${currentProject}/topography/shapefile` + (confirm ? '?confirm_crs=true' : '');
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
              body: fd
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({ detail: "Upload failed" }));
              const msg = errData.detail || "Upload failed";
              if (msg.includes('CRS') || msg.includes('ambiguous') || msg.includes('mismatch')) {
                if (window.confirm("Warning: " + msg + "\n\nDo you want to ignore this warning and force the import?")) {
                  await upload(true);
                  return;
                }
              }
              throw new Error(msg);
            }
            statusDiv.innerHTML = '<span style="color:var(--accent-green)">✓ Topography Shapefile uploaded successfully!</span>';
            await loadProjectScene(currentProject);
          };
          
          try {
            await upload(false);
          } catch (err) {
            statusDiv.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
          }
        } else {
          const fd = new FormData();
          fd.append('file', files[0]);
          try {
            const res = await fetch(`${API_BASE}/projects/${currentProject}/topography`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
              body: fd
            });
            if (!res.ok) throw new Error("Upload failed");
            statusDiv.innerHTML = '<span style="color:var(--accent-green)">✓ Topography uploaded successfully!</span>';
            await loadProjectScene(currentProject);
          } catch (err) {
            statusDiv.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
          }
        }
      };

      // 2. Trenches Upload
      document.getElementById('upload-trench-btn').onclick = async () => {
        const files = document.getElementById('trench-file-input').files;
        if (files.length === 0) return alert("Select trenches file(s) first");
        
        statusDiv.textContent = "Uploading trenches...";
        const fileList = Array.from(files);
        const hasShp = fileList.some(f => f.name.toLowerCase().endsWith('.shp'));
        const hasDbf = fileList.some(f => f.name.toLowerCase().endsWith('.dbf'));
        const hasShx = fileList.some(f => f.name.toLowerCase().endsWith('.shx'));
        
        if (hasShp) {
          if (!hasDbf || !hasShx) {
            statusDiv.innerHTML = '<span style="color:#f87171">Error: Shapefile upload requires .shp, .dbf, and .shx files together.</span>';
            return;
          }
          const shp = fileList.find(f => f.name.toLowerCase().endsWith('.shp'));
          const dbf = fileList.find(f => f.name.toLowerCase().endsWith('.dbf'));
          const shx = fileList.find(f => f.name.toLowerCase().endsWith('.shx'));
          const prj = fileList.find(f => f.name.toLowerCase().endsWith('.prj'));
          
          const fd = new FormData();
          fd.append('shp_file', shp);
          fd.append('dbf_file', dbf);
          fd.append('shx_file', shx);
          if (prj) fd.append('prj_file', prj);
          
          const upload = async (confirm = false) => {
            const url = `${API_BASE}/projects/${currentProject}/trenches/shapefile` + (confirm ? '?confirm_crs=true' : '');
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
              body: fd
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({ detail: "Upload failed" }));
              const msg = errData.detail || "Upload failed";
              if (msg.includes('CRS') || msg.includes('ambiguous') || msg.includes('mismatch')) {
                if (window.confirm("Warning: " + msg + "\n\nDo you want to ignore this warning and force the import?")) {
                  await upload(true);
                  return;
                }
              }
              throw new Error(msg);
            }
            statusDiv.innerHTML = '<span style="color:var(--accent-green)">✓ Trenches Shapefile uploaded successfully!</span>';
            await loadProjectScene(currentProject);
          };
          
          try {
            await upload(false);
          } catch (err) {
            statusDiv.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
          }
        } else {
          const fd = new FormData();
          fd.append('file', files[0]);
          try {
            const res = await fetch(`${API_BASE}/projects/${currentProject}/trenches`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
              body: fd
            });
            if (!res.ok) throw new Error("Upload failed");
            statusDiv.innerHTML = '<span style="color:var(--accent-green)">✓ Trenches uploaded successfully!</span>';
            await loadProjectScene(currentProject);
          } catch (err) {
            statusDiv.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
          }
        }
      };

      // 3. Wireframe Upload
      document.getElementById('upload-wire-btn').onclick = async () => {
        const file = document.getElementById('wire-file-input').files[0];
        const name = document.getElementById('wireframe-name').value;
        if (!file || !name) return alert("Select OBJ/DXF file and enter vein name first");
        
        statusDiv.textContent = "Uploading vein wireframe...";
        const fd = new FormData();
        fd.append('file', file);
        
        try {
          const res = await fetch(`${API_BASE}/projects/${currentProject}/wireframes?name=${encodeURIComponent(name)}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: fd
          });
          if (!res.ok) throw new Error("Upload failed");
          statusDiv.innerHTML = '<span style="color:var(--accent-green)">✓ Vein wireframe uploaded successfully!</span>';
          await loadProjectScene(currentProject);
        } catch (err) {
          statusDiv.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`;
        }
      };
    }

      const container = document.getElementById('modal-container');
      container.style.display = 'flex';

          </div>
          <div id="export-panel-mount"></div>
        </div>
      `;
      
      new window.ExportPanel('export-panel-mount', currentProject, sectionPanel);
    }
  </script>
